<!DOCTYPE html>
<html lang="fr">
  <head>

    <title>Caisse — hors ligne</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #FAFAF7;
        color: #15171C;
        display: flex;
        align-items: center;

        height: 100vh;
        margin: 0;

      .card { max-width: 320px; }

        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 0.9rem;
      }

  </head>
  <body>
    <div class="card">
      <h1>Pas de connexion</h1>

        Cette page n'a pas encore été visitée hors-ligne. Reconnecte-toi pour

      </p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
